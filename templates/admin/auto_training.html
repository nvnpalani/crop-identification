<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Auto Training Queue</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <style id="admin-styles">
        body { margin: 0; padding: 0; display: flex; background: #f8fafc; }
        .admin-sidebar { width: 260px; height: 100vh; background: white; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
        .admin-main { margin-left: 260px; width: calc(100% - 260px); min-height: 100vh; display: flex; flex-direction: column; }
        .admin-topbar { height: 70px; background: white; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; position: fixed; top: 0; left: 260px; right: 0; z-index: 500; box-sizing: border-box; }
        .sidebar-logo { padding: 1.5rem; display: flex; align-items: center; gap: 0.8rem; font-weight: bold; font-size: 1.2rem; color: var(--accent-forest); border-bottom: 1px solid var(--glass-border); }
        .sidebar-menu { padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; flex-grow: 1; }
        .sidebar-link { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem; border-radius: 8px; color: var(--text-main); text-decoration: none; font-weight: 500; transition: all 0.3s; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(16, 185, 129, 0.1); color: var(--accent-forest); font-weight: 600; }
        .admin-content { padding: 2rem; width: 100%; box-sizing: border-box; margin-top: 70px; }
        .app-header { display: none !important; }
        
        .data-table-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            margin-top: 1rem;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 800px;
        }
        .data-table th, .data-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .data-table th {
            background: var(--accent-forest);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .data-table tr:last-child td {
            border-bottom: none;
        }
        .data-table tr:hover td {
            background: rgba(16, 185, 129, 0.05);
        }
        .count-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-forest);
            padding: 0.4rem 1rem;
            border-radius: 99px;
            font-weight: bold;
            font-size: 0.95rem;
            display: inline-block;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-title {
            font-size: 1.5rem;
            color: var(--text-main);
            font-weight: 700;
        }
        
        @media (max-width: 768px) {
            .admin-sidebar { display: none; }
            .admin-main { margin-left: 0; width: 100%; }
            .admin-topbar { padding: 0 1rem; }
            .admin-content { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="admin-sidebar">
        <div class="sidebar-logo">
            <svg class="brand-icon" viewBox="0 0 24 24" style="width: 28px; height: 28px;"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#10b981" /><stop offset="100%" stop-color="#047857" /></linearGradient></defs><polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5" style="stroke: url(#bg);" /><polyline points="12,2 12,22" style="stroke: url(#bg);" /><polyline points="2,8.5 12,12 22,8.5" style="stroke: url(#bg);" /><polyline points="2,15.5 12,12 22,15.5" style="stroke: url(#bg);" /></svg>
            image detection
        </div>
        <div style="font-size: 0.7rem; color: var(--text-muted); font-weight: bold; padding: 1rem 1.5rem 0.5rem; text-transform: uppercase;">Admin Panel</div>
        <div class="sidebar-menu">
            <a href="{{ url_for('admin_dashboard') }}" class="sidebar-link ">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Dashboard
            </a>
            <a href="{{ url_for('admin_users') }}" class="sidebar-link ">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                User Management
            </a>
            <a href="{{ url_for('admin_detect') }}" class="sidebar-link ">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                Detect Image
            </a>
            <a href="{{ url_for('auto_training') }}" class="sidebar-link active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-10.05l5.67-5.67"></path></svg>
                Auto Training
            </a>
            <a href="{{ url_for('training_history') }}" class="sidebar-link ">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Training History
            </a>
            <a href="{{ url_for('suggestions') }}" class="sidebar-link ">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                AI Suggestions
            </a>
        </div>
        <div class="sidebar-menu" style="border-top: 1px solid var(--glass-border); flex-grow: 0;">
            <a href="{{ url_for('logout') }}" class="sidebar-link" style="color: #ef4444;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </a>
        </div>
    </div>
    <div class="admin-main">
        <div class="admin-topbar">
            <div></div> <!-- Left empty spacer -->
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span style="font-weight: 600; color: var(--text-main);">Admin</span>
                <div style="width: 35px; height: 35px; border-radius: 50%; background: var(--accent-forest); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; cursor: pointer;">A</div>
            </div>
        </div>
        <div class="admin-content">
            <div class="page-header">
                <h2 class="page-title">Auto Training Queue</h2>
                <button class="btn-submit" onclick="alert('Manual Retrain Triggered!')" style="padding: 0.6rem 1.5rem; font-size: 0.95rem;">
                    Force Retrain Now
                </button>
            </div>
            
            <div class="data-table-container">
                <table class="data-table" id="dataset-table">
                    <thead>
                        <tr>
                            <th>S.No</th>
                            <th>Model Name</th>
                            <th>Folder Name</th>
                            <th>Folder Class Name</th>
                            <th>Count</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Populated dynamically via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        const datasetTree = {{ dataset_tree | tojson }};
        const tableBody = document.getElementById('table-body');
        
        function formatName(str) {
            return str.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function populateTable() {
            tableBody.innerHTML = '';
            let rows = [];
            let sno = 1;
            
            Object.entries(datasetTree).forEach(([crop, categories]) => {
                Object.entries(categories).forEach(([cat, classes]) => {
                    Object.entries(classes).forEach(([cls, count]) => {
                        const limit = 100;
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${sno++}</td>
                            <td><strong>${formatName(crop)}</strong></td>
                            <td>${formatName(cat)}</td>
                            <td>${cls}</td>
                            <td>
                                <span class="count-badge">${count} / ${limit}</span>
                            </td>
                        `;
                        rows.push(tr);
                    });
                });
            });
            
            if (rows.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5"><div class="empty-state">No pending uploads found.</div></td></tr>`;
            } else {
                rows.forEach(r => tableBody.appendChild(r));
            }
        }
        
        populateTable();
    </script>
</body>
</html>
